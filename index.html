<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red de Gasolineras AS24 - España</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --as24-red: #e2001a;
            --as24-blue: #003087;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .header { text-align: center; color: var(--as24-blue); margin-bottom: 30px; }
        .container { max-width: 1000px; margin: auto; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; border-left: 5px solid var(--as24-red); box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin: 0 0 10px 0; color: var(--as24-blue); font-size: 1.2rem; }
        .card p { margin: 5px 0; font-size: 0.9rem; color: #555; }
        .card .address { font-weight: bold; color: #333; }
        .badge { background: #eee; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; margin-right: 5px; }
        .btn-map { display: inline-block; margin-top: 15px; padding: 8px 15px; background: var(--as24-blue); color: white; text-decoration: none; border-radius: 5px; font-size: 0.85rem; }
        .btn-map:hover { background: #00205b; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-gas-pump"></i> Red de Estaciones AS24 España</h1>
        <p>Direcciones reales para transporte profesional</p>
    </div>

    <input type="text" id="search" class="search-box" placeholder="Buscar por ciudad o provincia..." onkeyup="filterStations()">

    <div class="grid" id="station-grid">
        </div>
</div>

<script>
const stations = [
    { name: "AS24 La Jonquera", addr: "Pol. Ind. Camp de l'Oliver, C/ Mas de l'Hort", city: "La Jonquera", prov: "Girona", lat: 42.4103, lng: 2.8712, services: ["AdBlue", "24h", "Parking"] },
    { name: "AS24 Ribarroja", addr: "Pol. Ind. Sector 13, Avda. dels Fusters", city: "Ribarroja del Turia", prov: "Valencia", lat: 39.4812, lng: -0.5664, services: ["AdBlue", "GNV", "Ducha"] },
    { name: "AS24 San Sebastián Reyes", addr: "Autovía A-1, KM 24 (Vía de Servicio)", city: "S.S. de los Reyes", prov: "Madrid", lat: 40.5781, lng: -3.6122, services: ["AdBlue", "A-1"] },
    { name: "AS24 La Muela", addr: "Autovía A-2, KM 306 (Pol. Ind. Centrovía)", city: "La Muela", prov: "Zaragoza", lat: 41.5744, lng: -1.1189, services: ["AdBlue", "A-2"] },
    { name: "AS24 Guarromán", addr: "Pol. Ind. Guadiel, Autovía A-4 KM 280", city: "Guarromán", prov: "Jaén", lat: 38.1883, lng: -3.6744, services: ["AdBlue", "Parking"] },
    { name: "AS24 Benavente", addr: "A-6 Salida 261 (Cañada Real)", city: "Benavente", prov: "Zamora", lat: 42.0234, lng: -5.6512, services: ["AdBlue", "Restaurante"] },
    { name: "AS24 Irun", addr: "Zaisa III, C/ Antxotxipi 2", city: "Irún", prov: "Gipuzkoa", lat: 43.3361, lng: -1.7655, services: ["AdBlue", "Frontera"] },
    { name: "AS24 Albacete", addr: "Pol. Ind. Romica, Avda. B s/n", city: "Albacete", prov: "Albacete", lat: 39.0521, lng: -1.8412, services: ["AdBlue", "24h"] }
];

function displayStations(data) {
    const grid = document.getElementById('station-grid');
    grid.innerHTML = '';
    data.forEach(s => {
        const card = `
            <div class="card">
                <h3>${s.name}</h3>
                <p class="address"><i class="fas fa-map-marker-alt"></i> ${s.addr}</p>
                <p><i class="fas fa-city"></i> ${s.city} (${s.prov})</p>
                <div>${s.services.map(ser => `<span class="badge">${ser}</span>`).join('')}</div>
                <a href="https://www.google.com/maps?q=${s.lat},${s.lng}" target="_blank" class="btn-map">Ver en Google Maps</a>
            </div>
        `;
        grid.innerHTML += card;
    });
}

function filterStations() {
    const term = document.getElementById('search').value.toLowerCase();
    const filtered = stations.filter(s => 
        s.city.toLowerCase().includes(term) || 
        s.prov.toLowerCase().includes(term) ||
        s.name.toLowerCase().includes(term)
    );
    displayStations(filtered);
}

// Carga inicial
displayStations(stations);
</script>

</body>
</html>
