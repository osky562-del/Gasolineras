<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Real AS 24 España - Acceso Camiones</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; }
        .popup-as24 { line-height: 1.5; min-width: 200px; }
        .popup-as24 b { color: #e2001a; font-size: 16px; display: block; margin-bottom: 5px; }
        .btn-gps {
            display: block;
            background: #003087;
            color: white !important;
            text-align: center;
            padding: 12px;
            margin-top: 10px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([40.4167, -3.7037], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // DATOS VERIFICADOS CON EL FINDER OFICIAL DE AS 24
    const estaciones = [
        { name: "AS 24 A-1 TORREMOCHA", lat: 40.9723139, lng: -2.61637242, addr: "A-2 KM 117, Torremocha del Campo (Guadalajara)" },
        { name: "AS 24 A-4 MADRID SUR", lat: 40.164815, lng: -3.66493, addr: "C/ Narciso Monturiol, 30, Valdemoro (Madrid)" },
        { name: "AS 24 A-3 VALENCIA", lat: 39.48059, lng: -0.56461, addr: "Pol. Ind. Sector 13, Ribarroja de Turia" },
        { name: "AS 24 A-23 CAMINREAL", lat: 40.8356, lng: -1.303, addr: "Pol. Ind. El Gancho, Parcela 18, Caminreal (Teruel)" },
        { name: "AS 24 LA JONQUERA", lat: 42.41165, lng: 2.87328, addr: "Pol. Ind. Camp de l'Oliver, La Jonquera" },
        { name: "AS 24 IRÚN ZAISA", lat: 43.3361, lng: -1.7655, addr: "Zaisa III, C/ Antxotxipi 2, Irún" },
        { name: "AS 24 GUARROMÁN", lat: 38.18844, lng: -3.67395, addr: "A-4 KM 280, Pol. Ind. Guadiel" },
        { name: "AS 24 BENAVENTE", lat: 42.02328, lng: -5.65147, addr: "A-6 Salida 261, Benavente" }
    ];

    estaciones.forEach(est => {
        const marker = L.marker([est.lat, est.lng]).addTo(map);
        marker.bindPopup(`
            <div class="popup-as24">
                <b>${est.name}</b>
                <span style="font-size:12px; color:#555;">${est.addr}</span>
                <a class="btn-gps" href="https://www.google.com/maps/dir/?api=1&destination=${est.lat},${est.lng}&travelmode=driving" target="_blank">Ruta Camión (Google Maps)</a>
            </div>
        `);
    });
</script>
</body>
</html>
