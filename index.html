<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS24 Gasolineras</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    background: #111;
    color: #f0f0f0;
  }

  /* ── CABECERA ── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 50px;
    background: #0a0a0a;
    border-bottom: 3px solid #e8001d;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 12px;
    z-index: 2000;
  }
  #header .logo {
    background: #e8001d;
    color: white;
    font-weight: 900;
    font-size: 18px;
    padding: 4px 14px;
    letter-spacing: 1px;
  }
  #header .title {
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #header .count {
    margin-left: auto;
    font-size: 12px;
    color: #aaa;
  }
  #header .count span {
    color: #e8001d;
    font-weight: bold;
    font-size: 16px;
  }

  /* ── PANEL LATERAL ── */
  #panel {
    position: fixed;
    top: 50px; left: 0; bottom: 0;
    width: 300px;
    background: #141414;
    border-right: 1px solid #252525;
    display: flex;
    flex-direction: column;
    z-index: 1000;
    overflow: hidden;
  }

  #search-box {
    padding: 10px;
    border-bottom: 1px solid #252525;
    flex-shrink: 0;
  }
  #search-box input {
    width: 100%;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 4px;
    color: #f0f0f0;
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    box-sizing: border-box;
  }
  #search-box input:focus { border-color: #e8001d; }

  #list-header {
    padding: 6px 12px;
    font-size: 10px;
    color: #666;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-bottom: 1px solid #252525;
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #list-header .badge {
    background: #e8001d;
    color: white;
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 10px;
  }

  #station-list {
    flex: 1;
    overflow-y: auto;
  }
  #station-list::-webkit-scrollbar { width: 4px; }
  #station-list::-webkit-scrollbar-thumb { background: #333; }

  .station-item {
    padding: 10px 12px;
    border-bottom: 1px solid #1c1c1c;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .station-item:hover { background: #1a1a1a; }
  .station-item.active { background: #1e0808; border-left: 3px solid #e8001d; }

  .station-icon {
    width: 32px;
    height: 32px;
    background: #e8001d;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 13px;
    margin-top: 2px;
  }
  .station-icon span { transform: rotate(45deg); display: block; }

  .station-info { flex: 1; min-width: 0; }
  .station-name {
    font-weight: bold;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .station-city { font-size: 11px; color: #888; margin-bottom: 5px; }

  .btn-ruta {
    display: inline-block;
    background: #e8001d;
    color: white;
    font-size: 11px;
    font-weight: bold;
    padding: 4px 10px;
    border-radius: 3px;
    text-decoration: none;
    letter-spacing: 0.5px;
  }
  .btn-ruta:hover { background: #c00018; }

  /* ── MAPA ── */
  #map {
    position: fixed;
    top: 50px;
    left: 300px;
    right: 0;
    bottom: 0;
  }

  /* ── POPUP ── */
  .leaflet-popup-content-wrapper {
    background: #141414 !important;
    border: 1px solid #333 !important;
    border-radius: 6px !important;
    padding: 0 !important;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.8) !important;
  }
  .leaflet-popup-tip { background: #141414 !important; }
  .leaflet-popup-content { margin: 0 !important; width: 240px !important; }

  .popup-title {
    background: #e8001d;
    padding: 10px 12px;
    font-weight: bold;
    font-size: 14px;
    color: white;
    line-height: 1.3;
  }
  .popup-city {
    font-size: 10px;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }
  .popup-body { padding: 10px 12px; }
  .popup-addr {
    font-size: 11px;
    color: #888;
    margin-bottom: 10px;
    line-height: 1.4;
  }
  .popup-btn-main {
    display: block;
    background: #e8001d;
    color: white;
    text-align: center;
    padding: 9px;
    border-radius: 4px;
    font-weight: bold;
    font-size: 12px;
    text-decoration: none;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .popup-btn-main:hover { background: #c00018; color: white; }
  .popup-btn-sec {
    display: block;
    background: transparent;
    color: #888;
    text-align: center;
    padding: 6px;
    border-radius: 4px;
    font-size: 11px;
    text-decoration: none;
    border: 1px solid #333;
  }
  .popup-btn-sec:hover { background: #1e1e1e; color: #f0f0f0; }

  /* ── RESPONSIVE MÓVIL ── */
  @media (max-width: 640px) {
    #panel {
      top: auto;
      bottom: 0; left: 0; right: 0;
      width: auto;
      height: 220px;
      border-right: none;
      border-top: 2px solid #e8001d;
    }
    #map {
      top: 50px;
      left: 0;
      bottom: 220px;
    }
    #station-list { flex-direction: row; display: flex; overflow-x: auto; overflow-y: hidden; }
    .station-item { min-width: 200px; flex-direction: column; }
  }
</style>
</head>
<body>

<!-- CABECERA -->
<div id="header">
  <div class="logo">AS24</div>
  <div class="title">Gasolineras para Camiones</div>
  <div class="count"><span id="total">51</span> estaciones en España</div>
</div>

<!-- PANEL LATERAL -->
<div id="panel">
  <div id="search-box">
    <input type="text" id="search" placeholder="🔍  Buscar ciudad o nombre...">
  </div>
  <div id="list-header">
    <span>Estaciones</span>
    <span class="badge" id="count">51</span>
  </div>
  <div id="station-list"></div>
</div>

<!-- MAPA -->
<div id="map"></div>

// ═══════════════════════════════════════════════
// INICIALIZAR MAPA
// ═══════════════════════════════════════════════
var map = L.map('map', {
  center: [40.4, -3.7],
  zoom: 6,
  preferCanvas: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// ═══════════════════════════════════════════════
// ICONO
// ═══════════════════════════════════════════════
function makeIcon(active) {
  var color  = active ? '#ff1a2e' : '#e8001d';
  var border = active ? '#fff'    : 'rgba(255,255,255,0.5)';
  var shadow = active ? '0 0 12px rgba(255,30,50,0.9)' : '0 2px 6px rgba(0,0,0,0.5)';
  return L.divIcon({
    className: '',
    html: '<div style="width:28px;height:28px;background:' + color + ';border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid ' + border + ';box-shadow:' + shadow + ';display:flex;align-items:center;justify-content:center">' +
          '<span style="transform:rotate(45deg);font-size:12px">⛽</span></div>',
    iconSize:    [28, 28],
    iconAnchor:  [14, 28],
    popupAnchor: [0, -32]
  });
}

// ═══════════════════════════════════════════════
// CREAR MARCADORES
// ═══════════════════════════════════════════════
var markers   = {};
var activeId  = null;

STATIONS.forEach(function(s) {
  var marker = L.marker([s.lat, s.lng], { icon: makeIcon(false) }).addTo(map);

  var routeUrl = 'https://www.google.com/maps/dir/?api=1&destination=' + s.lat + ',' + s.lng + '&travelmode=driving';
  var viewUrl  = 'https://www.google.com/maps/search/?api=1&query=' + s.lat + ',' + s.lng;

  marker.bindPopup(
    '<div class="popup-title">' + s.name + '<div class="popup-city">' + s.city + '</div></div>' +
    '<div class="popup-body">' +
      '<div class="popup-addr">📍 ' + s.addr + '</div>' +
      '<a class="popup-btn-main" href="' + routeUrl + '" target="_blank">🗺️ CÓMO LLEGAR</a>' +
      '<a class="popup-btn-sec"  href="' + viewUrl  + '" target="_blank">📌 Ver en Google Maps</a>' +
    '</div>',
    { minWidth: 240, maxWidth: 240 }
  );

  marker.on('click', function() {
    setActive(s.id);
    highlightCard(s.id);
  });

  markers[s.id] = marker;
});

function setActive(id) {
  if (activeId && markers[activeId]) {
    markers[activeId].setIcon(makeIcon(false));
  }
  activeId = id;
  markers[id].setIcon(makeIcon(true));
  document.querySelectorAll('.station-item').forEach(function(el) {
    el.classList.remove('active');
  });
  var card = document.getElementById('s' + id);
  if (card) card.classList.add('active');
}

function highlightCard(id) {
  var card = document.getElementById('s' + id);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function flyTo(id) {
  var s = STATIONS.find(function(x) { return x.id === id; });
  if (!s) return;
  map.flyTo([s.lat, s.lng], 15, { duration: 1 });
  setTimeout(function() { markers[id].openPopup(); }, 1100);
  setActive(id);
}

// ═══════════════════════════════════════════════
// RENDERIZAR LISTA
// ═══════════════════════════════════════════════
function renderList(data) {
  document.getElementById('count').textContent = data.length;
  var el = document.getElementById('station-list');

  if (!data.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:#666">No se encontraron estaciones</div>';
    return;
  }

  el.innerHTML = data.map(function(s) {
    var routeUrl = 'https://www.google.com/maps/dir/?api=1&destination=' + s.lat + ',' + s.lng + '&travelmode=driving';
    return (
      '<div class="station-item" id="s' + s.id + '" onclick="flyTo(' + s.id + ')">' +
        '<div class="station-icon"><span>⛽</span></div>' +
        '<div class="station-info">' +
          '<div class="station-name">' + s.name + '</div>' +
          '<div class="station-city">📍 ' + s.city + '</div>' +
          '<a class="btn-ruta" href="' + routeUrl + '" target="_blank" onclick="event.stopPropagation()">🗺️ Ruta</a>' +
        '</div>' +
      '</div>'
    );
  }).join('');
}

renderList(STATIONS);

// ═══════════════════════════════════════════════
// BÚSQUEDA
// ═══════════════════════════════════════════════
document.getElementById('search').addEventListener('input', function(e) {
  var q = e.target.value.toLowerCase().trim();
  var filtered = STATIONS.filter(function(s) {
    return s.name.toLowerCase().indexOf(q) > -1 ||
           s.city.toLowerCase().indexOf(q) > -1 ||
           s.addr.toLowerCase().indexOf(q) > -1;
  });

  // Mostrar/ocultar marcadores
  STATIONS.forEach(function(s) {
    var show = filtered.some(function(x) { return x.id === s.id; });
    if (show && !map.hasLayer(markers[s.id])) markers[s.id].addTo(map);
    if (!show && map.hasLayer(markers[s.id]))  map.removeLayer(markers[s.id]);
  });

  renderList(filtered);
});
</script>
</body>
</html>
